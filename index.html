<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA Rental Listings Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>🏠 LA Furnished Rentals</h1>
            <p class="subtitle">12 Curated Listings for Your Stay</p>
        </div>
    </header>

    <main class="container">
        <section class="filters">
            <div class="filter-group">
                <label for="sort">Sort by:</label>
                <select id="sort" onchange="sortListings()">
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="beds-desc">Bedrooms: Most</option>
                    <option value="beds-asc">Bedrooms: Least</option>
                    <option value="sqft-desc">Sq Ft: Largest</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="bedrooms">Bedrooms:</label>
                <select id="bedrooms" onchange="filterListings()">
                    <option value="all">All</option>
                    <option value="1">1 BR</option>
                    <option value="2">2 BR</option>
                    <option value="3">3 BR</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="pets">Pets:</label>
                <select id="pets" onchange="filterListings()">
                    <option value="all">All</option>
                    <option value="yes">Pet Friendly</option>
                    <option value="no">No Pets</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="maxPrice">Max Price:</label>
                <select id="maxPrice" onchange="filterListings()">
                    <option value="10000">Any</option>
                    <option value="3500">$3,500</option>
                    <option value="3750">$3,750</option>
                    <option value="4000">$4,000</option>
                </select>
            </div>
            <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
        </section>

        <section class="stats">
            <div class="stat">
                <span class="stat-number" id="listingCount">12</span>
                <span class="stat-label">Listings</span>
            </div>
            <div class="stat">
                <span class="stat-number">$3,450</span>
                <span class="stat-label">Min Price</span>
            </div>
            <div class="stat">
                <span class="stat-number">$4,100</span>
                <span class="stat-label">Max Price</span>
            </div>
            <div class="stat">
                <span class="stat-number">$3,763</span>
                <span class="stat-label">Avg Price</span>
            </div>
        </section>

        <section class="listings" id="listings">
            <!-- Listings injected by JS -->
        </section>
    </main>

    <!-- Modal for expanded view -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-body" id="modalBody">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Generated March 2026 • Data sourced from FurnishedFinder, SabbaticalHomes, Airbnb</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
